<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Multica++ Console</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./app.js" defer></script>
  </head>
  <body>
    <div id="app-shell">
      <aside id="sidebar" aria-label="Workspace navigation">
        <div class="product-mark">Multica++</div>

        <button class="workspace-switcher" type="button" aria-label="Current workspace">
          <span class="workspace-avatar">SP</span>
          <span class="workspace-copy">
            <strong>SparkProject</strong>
            <span>Workspace</span>
          </span>
          <span class="chevron" aria-hidden="true"></span>
        </button>

        <nav class="sidebar-nav sidebar-nav-primary" aria-label="Project navigation">
          <button type="button" data-nav-target="overview">
            <span class="nav-icon nav-icon-home" aria-hidden="true"></span>
            <span>Overview</span>
          </button>
          <button type="button" data-nav-target="project" aria-current="page">
            <span class="nav-icon nav-icon-folder" aria-hidden="true"></span>
            <span>Project</span>
          </button>
          <button type="button" data-nav-target="agents">
            <span class="nav-icon nav-icon-agent" aria-hidden="true"></span>
            <span>Agents</span>
          </button>
          <button type="button" data-nav-target="runs">
            <span class="nav-icon nav-icon-play" aria-hidden="true"></span>
            <span>Runs</span>
          </button>
          <button type="button" data-nav-target="environments">
            <span class="nav-icon nav-icon-cube" aria-hidden="true"></span>
            <span>Environments</span>
          </button>
          <button type="button" data-nav-target="data">
            <span class="nav-icon nav-icon-database" aria-hidden="true"></span>
            <span>Data</span>
          </button>
          <button type="button" data-nav-target="settings">
            <span class="nav-icon nav-icon-gear" aria-hidden="true"></span>
            <span>Settings</span>
          </button>
        </nav>

        <nav class="sidebar-nav sidebar-nav-secondary" aria-label="Help navigation">
          <button type="button" data-nav-target="docs">
            <span class="nav-icon nav-icon-docs" aria-hidden="true"></span>
            <span>Docs</span>
          </button>
          <button type="button" data-nav-target="support">
            <span class="nav-icon nav-icon-support" aria-hidden="true"></span>
            <span>Support</span>
          </button>
        </nav>

        <button class="user-switcher" type="button" aria-label="Current user">
          <span class="user-avatar">AD</span>
          <span>Admin User</span>
          <span class="chevron" aria-hidden="true"></span>
        </button>
      </aside>

      <div class="workspace">
        <header id="topbar">
          <div class="topbar-context" aria-label="Run context">
            <span class="context-item">
              <span class="context-label">Project</span>
              <span id="project-value" class="context-value with-chevron">MulticaPlusPlus</span>
            </span>
            <span class="context-item">
              <span class="context-label">Active Agent</span>
              <span id="agent-value" class="context-value with-status with-chevron">planner-agent</span>
            </span>
            <span class="context-item">
              <span class="context-label">Runtime</span>
              <span id="runtime-value" class="context-value">local-docker</span>
            </span>
            <span class="context-item">
              <span class="context-label">Run Status</span>
              <span id="run-status-value" class="context-value with-status">Running</span>
            </span>
          </div>

          <div class="topbar-actions">
            <button type="button" id="configure-agent-permissions" class="outline-button" data-action="open-permissions">
              <span class="button-icon nav-icon-lock" aria-hidden="true"></span>
              <span>Configure Agent Permissions</span>
            </button>
            <button type="button" class="more-button" aria-label="More actions">...</button>
          </div>
        </header>

        <main class="views">
          <section id="view-control" class="control-grid" data-view="project">
            <section id="goal-panel" class="panel" aria-labelledby="goal-heading">
              <header class="panel-header">
                <span class="panel-index">1</span>
                <h1 id="goal-heading">Goal</h1>
              </header>
              <div id="goal-summary" class="dynamic-region" aria-live="polite"></div>
            </section>

            <section id="plan-panel" class="panel" aria-labelledby="plan-heading">
              <header class="panel-header">
                <span class="panel-index">2</span>
                <h1 id="plan-heading">Plan</h1>
              </header>
              <div id="plan-list" class="dynamic-region" aria-live="polite"></div>
            </section>

            <section id="permission-panel" class="panel" aria-labelledby="permission-heading">
              <header class="panel-header">
                <span class="panel-index">3</span>
                <h1 id="permission-heading">One-click Agent Permission Setup</h1>
              </header>
              <div id="permission-summary" class="dynamic-region" aria-live="polite"></div>
              <div id="permission-scopes" class="dynamic-region" aria-live="polite"></div>
              <div id="permission-risk" class="dynamic-region" aria-live="polite"></div>
              <div class="permission-actions">
                <button type="button" id="preview-permission-configuration" class="outline-button" data-action="preview-permission">
                  <span class="button-icon nav-icon-eye" aria-hidden="true"></span>
                  <span>Preview Configuration</span>
                </button>
                <button type="button" id="apply-permissions" class="primary-button" data-action="apply-permission">
                  <span class="button-icon nav-icon-lock" aria-hidden="true"></span>
                  <span>Apply Permissions</span>
                </button>
              </div>
              <p class="permission-footnote">Permissions are applied as a temporary lease and auto-expire.</p>
            </section>
          </section>

          <section id="activity-view" class="placeholder-view" data-view="activity" hidden>
            <header class="view-header">
              <h1>Activity</h1>
            </header>
            <div id="activity-feed" class="dynamic-region" aria-live="polite"></div>
          </section>

          <section id="records-view" class="placeholder-view" data-view="records" hidden>
            <header class="view-header">
              <h1>Records</h1>
            </header>
            <div id="records-list" class="dynamic-region" aria-live="polite"></div>
          </section>

          <section id="settings-view" class="placeholder-view" data-view="settings" hidden>
            <header class="view-header">
              <h1>Settings</h1>
            </header>
            <div id="settings-panel" class="dynamic-region" aria-live="polite"></div>
          </section>

          <section id="placeholder-view" class="placeholder-view" data-view="placeholder" hidden>
            <header class="view-header">
              <h1 id="placeholder-heading">Project</h1>
            </header>
            <div id="placeholder-content" class="dynamic-region" aria-live="polite"></div>
          </section>
        </main>
      </div>
    </div>
  </body>
</html>
